services:
  db:
    image: postgres:16-alpine
    container_name: activepdf-db
    environment:
      POSTGRES_USER: activepdf
      POSTGRES_PASSWORD: activepdf
      POSTGRES_DB: activepdf
    ports:
      # 5433 no host: a 5432 já é usada pelo PostgreSQL do sistema
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activepdf -d activepdf"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
